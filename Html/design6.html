        /* Poster */

            background: #ff6a1c;
            position: relative;
            overflow: hidden;
            padding: 15px;
        }

        /* Floating Leaves / Chilli */


        /* Main Card */
        .card {
            position: absolute;
            top: 124px;
            left: 82px;
            width: 228px;
            height: 272px;
            background: #3a1407;
            border-radius: 14px;
            z-index: 2;
        }

        /* Pizza Image */
        .pizza-wrap {
            position: absolute;
            top: 32px;
            left: 50%;
            transform: translateX(-50%);
            width: 230px;
            height: 230px;
            border-radius: 50%;
            z-index: 3;
            box-shadow: 0 15px 20px rgba(0, 0, 0, .18);
        }

        .pizza-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        /* Text */
        .title {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%) rotate(-15deg);
            font-family: 'Bebas Neue', sans-serif;
            font-size: 85px;
            color: #fff;
            letter-spacing: 1px;
            z-index: 4;
            text-shadow: 0 3px 0 rgba(0, 0, 0, .15);
        }

        .subtitle {
            position: absolute;
            bottom: 132px;
            left: 66%;
            transform: translateX(-50%) rotate(-15deg);
            font-family: "Splash", cursive;
            font-size: 20px;
            color: #ff8c35;
            z-index: 4;
        }



        .shape {
            position: absolute;
            z-index: 1;
        }

        .deco-img {
            object-fit: contain;
            display: block;
        }

        /* Leaf Positions */
        .leaf.one {
            top: -12px;
            right: -40px;
            width: 111px;
            height: auto;
        }

        .leaf.tomato {
            bottom: 97px;
            right: 2px;
            width: 111px;
            height: auto;
            z-index: 10;
        }


        .leaf.two {
            bottom: 90px;
            left: -15px;
            width: 133px;
            height: auto;
            transform: rotate(-40deg);
            z-index: 10;
        }

        /* Chilli Positions */
        .chilli.one {
            top: 240px;
            right: 35px;
            width: 60px;
            height: auto;
            transform: rotate(-60deg);
        }

        .chilli.two {
            top: -23px;
            left: -64px;
            width: 162px;
            height: auto;
            transform: rotate(-117deg);
        }

        .chilli.three {
            top: 130px;
            left: 20px;
            width: 115px;
            height: auto;
            transform: rotate(-50deg);
        }

        .bg-texture {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
            pointer-events: none;
        }

        .footer {

            bottom: 14px;

        <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

        <script>
            async function downloadPoster() {
                const card = document.getElementById('posterCard5');
                const btn = document.querySelector('.d5-download-btn');

                btn.innerHTML = '<i class="bi bi-hourglass-split"></i> Generating...';
                btn.disabled = true;

                const EXPORT_W = 1080;
                const CARD_RADIUS = 14;     /* match border-radius in CSS */
                const BG_COLOR = '#1a1a2e';
                const scale = EXPORT_W / card.offsetWidth;

                try {
                    /* Step 1 — render to raw canvas, transparent bg */
                    const rawCanvas = await html2canvas(card, {
                        scale: scale,
                        backgroundColor: null,   /* let CSS bg show — no white override */
                        logging: false,
                        useCORS: true,
                        allowTaint: false,
                        imageTimeout: 15000,
                    });

                    /* Step 2 — new canvas with rounded-corner clip */
                    const out = document.createElement('canvas');
                    out.width = rawCanvas.width;
                    out.height = rawCanvas.height;
                    const ctx = out.getContext('2d');
                    const r = CARD_RADIUS * scale;   /* scale radius to export DPI */

                    /* Rounded-rect clip path */
                    ctx.beginPath();
                    ctx.moveTo(r, 0);
                    ctx.lineTo(out.width - r, 0);
                    ctx.quadraticCurveTo(out.width, 0, out.width, r);
                    ctx.lineTo(out.width, out.height - r);
                    ctx.quadraticCurveTo(out.width, out.height, out.width - r, out.height);
                    ctx.lineTo(r, out.height);
                    ctx.quadraticCurveTo(0, out.height, 0, out.height - r);
                    ctx.lineTo(0, r);
                    ctx.quadraticCurveTo(0, 0, r, 0);
                    ctx.closePath();
                    ctx.clip();

                    /* Fill dark bg first — no transparent / white corners */
                    ctx.fillStyle = BG_COLOR;
                    ctx.fillRect(0, 0, out.width, out.height);

                    /* Paint captured render on top */
                    ctx.drawImage(rawCanvas, 0, 0);

                    /* Step 3 — download */
                    const link = document.createElement('a');
                    link.download = 'menu-design5-card-instagram.png';
                    link.href = out.toDataURL('image/png', 1.0);
                    link.click();

                } catch (err) {
                    console.error('Poster generation failed:', err);
                    alert('Failed to generate image. Please try again.\n' + err.message);
                }

                btn.innerHTML = '<i class="bi bi-download"></i> Download Poster';
                btn.disabled = false;
            }
        </script>
