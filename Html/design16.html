<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zato Thai Cuisine</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800;900&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#c9c2d4;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:40px;
  font-family:'Montserrat',sans-serif;
}

.poster{
  position:relative;
  width:360px;
  height:460px;
  background:#f1ede7;
  border-radius:10px;
  overflow:hidden;
}

/* texture */
.poster::before{
  content:"";
  position:absolute;
  inset:0;
  background-image:repeating-linear-gradient(
    -60deg,
    transparent,
    transparent 22px,
    rgba(0,0,0,0.03) 22px,
    rgba(0,0,0,0.03) 23px
  );
}

/* =========================
   BRAND
========================= */
.brand{
  position:relative;
  z-index:5;

  display:flex;
  align-items:center;
  justify-content:flex-start;

  gap:8px;

  padding-top:18px;
  padding-left:24px;

  color:#555;
  font-size:9px;
  font-weight:700;
  letter-spacing:1px;
  text-transform:uppercase;
}

.brand img{
  width:26px;
  height:26px;
  border-radius:50%;
  object-fit:cover;
  display:block;
}

/* =========================
   HEADLINE
========================= */
.headline-wrap{
  position:relative;
  z-index:5;
  padding:20px 26px;
}

.headline{
  font-size:48px;
  line-height:0.95;
  font-weight:900;
  color:#2f8119;
  margin-bottom:12px;
}

.subheadline{
  font-size:12px;
  font-weight:800;
  letter-spacing:4px;
}

/* =========================
   GREEN BANNER
========================= */
.banner{
  position:absolute;
  bottom:70px;
  left:0;
  width:100%;
  height:145px;
  z-index:4;
}

.banner-bg{
  position:absolute;
  left:22px;
  right:65px;
  top:0;
  bottom:0;
  background:#2f8119;
  border-radius:75px 0 0 0;
}

/* order button */
.order-btn{
  position:absolute;
  top:24px;
  left:42px;

  border:1px solid rgba(255,255,255,0.9);
  border-radius:30px;

  padding:7px 18px;

  color:#fff;
  font-family:'Dancing Script',cursive;
  font-size:16px;
  font-weight:700;
}

/* location */
.location{
  position:absolute;
  top:78px;
  left:36px;

  display:flex;
  align-items:flex-start;
  gap:6px;

  color:#fff;
  font-size:9px;
  line-height:1.5;
}

.location svg{
  width:12px;
  height:12px;
  fill:#fff;
  flex-shrink:0;
  margin-top:2px;
}

/* =========================
   FOOD IMAGE
========================= */
.food-wrap{
  position:absolute;
  bottom:54px;
  right:-12px;

  width:220px;
  height:220px;

  border-radius:50%;
  overflow:hidden;

  z-index:8;

  box-shadow:-4px 4px 22px rgba(0,0,0,0.25);
}

.food-wrap img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* =========================
   FOOTER
========================= */
.footer{
  position:absolute;
  bottom:0;
  left:0;
  right:0;

  height:48px;
  background:#2f8119;

  display:flex;
  align-items:center;
  justify-content:space-between;

  padding:0 18px;

  z-index:10;
}

.footer-item{
  display:flex;
  align-items:center;
  gap:6px;

  color:#fff;
  font-size:9px;
  font-weight:600;
}

.footer-item svg{
  width:12px;
  height:12px;
  fill:#fff;
}

.divider{
  width:1px;
  height:22px;
  background:rgba(255,255,255,0.25);
}
</style>
</head>

<body>

<div class="poster">

  <!-- BRAND -->
  <div class="brand">
    <img
      src="https://static.vecteezy.com/system/resources/thumbnails/014/664/003/small_2x/cafe-and-resto-logo-vector.jpg"
      alt="Logo">

    | <span>Zato Thai Cuisine</span>
  </div>

  <!-- HEADLINE -->
  <div class="headline-wrap">
    <div class="headline">
      Deeply<br>
      Satisfying
    </div>

    <div class="subheadline">
      FAN FAVORITE
    </div>
  </div>

  <!-- GREEN BANNER -->
  <div class="banner">

    <div class="banner-bg"></div>

    <div class="order-btn">
      Order now
    </div>

    <div class="location">

      <svg viewBox="0 0 24 24">
        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5S10.62 6.5 12 6.5s2.5 1.12 2.5 2.5S13.38 11.5 12 11.5z"/>
      </svg>

      <span>
        119 Anywhere St,<br>
        Any City, State 12345
      </span>

    </div>

  </div>

  <!-- FOOD IMAGE -->
  <div class="food-wrap">
    <img
      src="https://images.unsplash.com/photo-1512621776951-a57141f2eefd?w=800"
      alt="Food">
  </div>

  <!-- FOOTER -->
  <div class="footer">

    <div class="footer-item">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>

      www.zatothaicuisine.com
    </div>

    <div class="divider"></div>

    <div class="footer-item">

      <svg viewBox="0 0 24 24">
        <path d="M6.62 10.79a15.053 15.053 0 006.59 6.59l2.2-2.2
        c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57
        .55 0 1 .45 1 1V20c0 .55-.45 1-1 1C10.33 21
        3 13.67 3 4c0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1
        0 1.25.2 2.45.57 3.57.11.35.03.74-.24 1.02l-2.21 2.2z"/>
      </svg>

      +91 98765 43210
    </div>

  </div>

</div>

</body>
</html>
