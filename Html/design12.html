<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Borcelle Pizza Poster</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Playfair+Display:ital,wght@1,700&family=Barlow+Condensed:wght@400;600;700;800;900&family=Lato:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #b8b4ac;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    padding: 30px 20px;
    font-family: 'Barlow Condensed', sans-serif;
  }

  /* ════════════════════════════
     POSTER  4:5
  ════════════════════════════ */
  .poster {
    position: relative;
    width: 400px;
    height: 500px;
    background: #f5f0e6;
    overflow: hidden;
    border-radius: 6px;
    box-shadow: 0 12px 50px rgba(0,0,0,0.32);
    display: flex;
    flex-direction: column;
  }

  /* ══════════════════════════════════════
     TOP SECTION  (main content area)
  ══════════════════════════════════════ */
  .top-section {
    position: relative;
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* ── RED VERTICAL STRIPE with drips ── */
  .stripe {
    position: absolute;
    top: 0;
    left: 78px;
    width: 64px;
    top: 0;
    bottom: -32px; /* extend past section so drips don't clip */
    background: #c93a1a;
    z-index: 2;
  }

  /* SVG drips — full control over each drop shape */
  .stripe-drips-svg {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    overflow: visible;
    z-index: 3;
  }

  /* ── PIZZA ── */
  .pizza-wrap {
    position: absolute;
    top: 10%;
    left: 8%;
    /* transform: translate(50%); */
    width: 336px;
    height: 270px;
    /* border-radius: 50%; */
    overflow: hidden;
    z-index: 6;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.42);
    border: 6px solid #fff;
    flex-shrink: 0;
  }
  .pizza-wrap img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }

  /* ── RIGHT CONTENT ── */
  .right-col {
position: absolute;
    top: -64px;
    bottom: 0;
    left: 126px;
    right: 0;
    /* padding: 16px 16px 12px 18px; */
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    z-index: 5;
  }

  /* heading block */
  .heading-block { margin-bottom: 2px; }
  .heading-super {
    font-family: 'Anton', sans-serif;
    font-size: 38px;
    color: #c93a1a;
    text-transform: uppercase;
    line-height: 0.9;
    letter-spacing: 0.5px;
  }
  .heading-pizza {
 font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 57px;
    color: #cbcbcd;
    line-height: 0.9;
    transform: rotate(-33deg);
    opacity: 70%;

  }

  /* cloud badge */
  .badge-wrap {
    position: relative;
   bottom: 160px;
    left: 0;
  }
  .badge {
    position: relative;
    color: #c93a1a;
    border-radius: 14px;
    padding: 8px 16px 10px;
    text-align: center;
    min-width: 100px;
  }

  .badge-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 10.5px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #c93a1a;
    position: relative; z-index: 2;
    display: block;
  }
  .badge-value {
    font-family: 'Anton', sans-serif;
    font-size: 40px;
    color: #c93a1a;
    line-height: 1.05;
    position: relative; z-index: 2;
    white-space: nowrap;
    display: block;
    text-transform: uppercase;

  }

  /* tagline */
  .tagline {
    font-family: 'Lato', sans-serif;
    font-style: italic;
    font-weight: 700;
    font-size: 11px;
    color: #3a1a08;
    line-height: 1.5;
  }

  /* ORDER TODAY btn */
  .order-btn {
    display: inline-block;
    background: transparent;
    border: 2px solid #c93a1a;
    color: #c93a1a;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 5px 14px;
    border-radius: 3px;
    width: fit-content;
  }

  /* ══════════════════════════════════════
     RESTAURANT DETAILS  –  bottom strip
  ══════════════════════════════════════ */
  .restaurant-strip {
    position: relative;
    background: #c93a1a;
    padding: 10px 14px 10px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    z-index: 10;
    flex-shrink: 0;
  }

  /* Logo */
  .resto-logo {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    overflow: hidden;
    border: 2.5px solid rgba(255,255,255,0.6);
    flex-shrink: 0;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .resto-logo img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    border-radius: 50%;
  }

  /* Name + divider + contacts */
  .resto-info {
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 3px;
    flex: 1;
  }

  .resto-name {
    font-family: 'Anton', sans-serif;
    font-size: 16px;
    color: #fff;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    line-height: 1;
  }

  .resto-divider {
    width: 100%;
    height: 1px;
    background: rgba(255,255,255,0.35);
    margin: 2px 0;
  }

  .resto-contacts {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .resto-contact-row {
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .icon-circle {
    width: 14px;
    height: 14px;
    background: rgba(255,255,255,0.2);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .icon-circle svg {
    width: 7px; height: 7px;
    fill: #fff;
  }

  .resto-contact-text {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 8px;
    color: rgba(255,255,255,0.92);
    letter-spacing: 0.5px;
  }

  /* Website on right */
  .resto-website {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    justify-content: center;
    gap: 3px;
    flex-shrink: 0;
  }
  .website-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 8px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.6);
  }
  .website-url {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 8px;
    color: #fff;
    letter-spacing: 0.5px;
    text-decoration: underline;
    text-underline-offset: 2px;
    text-decoration-color: rgba(255,255,255,0.4);
  }

  /* ── DOWNLOAD BUTTON ── */
  .dl-btn {
    background: #c93a1a;
    color: #fff;
    border: none;
    padding: 11px 30px;
    font-family: 'Anton', sans-serif;
    font-size: 15px;
    letter-spacing: 2px;
    text-transform: uppercase;
    border-radius: 30px;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(201,58,26,0.45);
    transition: opacity .2s, transform .15s;
  }
  .dl-btn:hover   { opacity: .88; transform: translateY(-2px); }
  .dl-btn:active  { transform: translateY(0); }
  .dl-btn:disabled { opacity: .55; cursor: not-allowed; transform: none; }
</style>
</head>
<body>

<div class="poster" id="poster">

  <!-- ════ TOP MAIN SECTION ════ -->
  <div class="top-section">

    <!-- Red stripe with SVG drips -->
    <div class="stripe">
      <svg class="stripe-drips-svg" viewBox="0 0 64 80" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg" style="position:absolute;bottom:-40px;left:0;width:100%;height:80px;">
        <path d="M0,0 L64,0 L64,20
          Q58,20 58,35 Q58,52 52,52 Q46,52 46,35 Q46,20 40,20
          Q34,20 34,30 Q34,48 28,48 Q22,48 22,30 Q22,20 16,20
          Q10,20 10,42 Q10,58 4,58 Q0,58 0,42 Z" fill="#c93a1a"/>
      </svg>
    </div>

    <!-- Pizza image -->
    <div class="pizza-wrap">
      <img
        src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=600&q=90"
        alt="Pizza"
        crossorigin="anonymous"
      >
    </div>

    <!-- Right content -->
    <div class="right-col">

      <!-- Heading -->
      <div class="heading-block">
        <!-- <div class="heading-super">DELICIOUS</div> -->
        <div class="heading-pizza">DELICIOUS</div>
        <div class="heading-pizza">DELICIOUS</div>
        <div class="heading-pizza">DELICIOUS</div>
        <div class="heading-pizza">DELICIOUS</div>
        <div class="heading-pizza">DELICIOUS</div>
        <div class="heading-pizza">DELICIOUS</div>
        <div class="heading-pizza">DELICIOUS</div>
        <div class="heading-pizza">DELICIOUS</div>
        <div class="heading-pizza">DELICIOUS</div>
        <div class="heading-pizza">DELICIOUS</div>
        <div class="heading-pizza">DELICIOUS</div>
      </div>

      <!-- Badge -->
      <div class="badge-wrap">
        <div class="badge">
          <span class="badge-label">Hurry Up!!</span>
          <span class="badge-value">Order Now</span>
        </div>
      </div>

     

      <!-- CTA -->

    </div><!-- /.right-col -->
  </div><!-- /.top-section -->

  <!-- ════ RESTAURANT DETAILS STRIP ════ -->
  <div class="restaurant-strip">

    <!-- Logo -->
    <div class="resto-logo">
      <img
        src="https://static.vecteezy.com/system/resources/thumbnails/014/664/003/small_2x/cafe-and-resto-logo-vector.jpg"
        alt="Restaurant Logo"
        crossorigin="anonymous"
      >
    </div>

    <!-- Name + contacts -->
    <div class="resto-info">
      <div class="resto-name">Borcelle &amp; Co.</div>
      <div class="resto-divider"></div>
      <div class="resto-contacts">

        <div class="resto-contact-row">
          <div class="icon-circle">
            <!-- phone -->
            <svg viewBox="0 0 10 10" xmlns="http://www.w3.org/2000/svg">
              <path d="M2 1.5 Q2 3 4 5 Q6 7 7.5 8 L8.5 7 Q9 6.5 8.5 6 L7 4.5 Q6.5 4 6 4.5 L5.5 5 Q4.5 4.5 3.5 3 L4 2.5 Q4.5 2 4 1.5 L2.5 0.5 Q2 0 2 1.5Z"/>
            </svg>
          </div>
          <div class="resto-contact-text">+123-456-7890</div>
        </div>

        <div class="resto-contact-row">
          <div class="icon-circle">
            <!-- pin -->
            <svg viewBox="0 0 10 10" xmlns="http://www.w3.org/2000/svg">
              <path d="M5 0.5 C3 0.5 1.5 2 1.5 3.8 C1.5 6.5 5 9.5 5 9.5 C5 9.5 8.5 6.5 8.5 3.8 C8.5 2 7 0.5 5 0.5Z"/>
              <circle cx="5" cy="3.8" r="1.2" fill="#c93a1a"/>
            </svg>
          </div>
          <div class="resto-contact-text">123 Anywhere St., Any City, ST 12345</div>
        </div>

      </div>
    </div>

    <!-- Website -->
    <div class="resto-website">
      <div class="website-label">Visit Us</div>
      <div class="website-url">www.borcelle.com</div>
    </div>

  </div><!-- /.restaurant-strip -->

</div><!-- /.poster -->

<!-- <button class="dl-btn" id="dlBtn" onclick="downloadPoster()">⬇ Download Poster</button> -->

<script>
function downloadPoster() {
  const card = document.getElementById('poster');
  const btn  = document.getElementById('dlBtn');
  btn.textContent = '⏳ Generating…';
  btn.disabled = true;
  const scale = 1080 / card.offsetWidth;
  html2canvas(card, {
    scale, backgroundColor: null, logging: false,
    useCORS: true, allowTaint: true, imageTimeout: 0,
    onclone(clonedDoc) {
      const imgs = clonedDoc.querySelectorAll('img');
      return Promise.all([...imgs].map(img =>
        new Promise(res => { if (img.complete) res(); else { img.onload = res; img.onerror = res; } })
      ));
    }
  }).then(canvas => {
    const a = document.createElement('a');
    a.download = 'borcelle-pizza-poster.png';
    a.href = canvas.toDataURL('image/png', 1.0);
    a.click();
    btn.textContent = '⬇ Download Poster';
    btn.disabled = false;
  }).catch(err => {
    console.error(err);
    alert('Failed – please try again.');
    btn.textContent = '⬇ Download Poster';
    btn.disabled = false;
  });
}
</script>
</body>
</html>
