<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Luxury Restaurant Poster</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#e7e1d9;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:40px;
  font-family:'Jost',sans-serif;
}

.poster{
  width:430px;
  background:#faf7f2;
  position:relative;
  overflow:hidden;
  border:1px solid rgba(139,104,69,0.15);
}

/* =========================
   BACKGROUND PATTERN
========================= */

.poster::before{
  content:"";
  position:absolute;
  inset:0;

  background-image:
  radial-gradient(rgba(139,104,69,0.08) 1px, transparent 1px);

  background-size:20px 20px;

  opacity:.4;
}

/* =========================
   HEADER
========================= */

.header{
  position:relative;
  z-index:2;

  background:#2c1f14;

  padding:26px 30px 20px;
}

.logo-wrap{
  display:flex;
  align-items:center;
  gap:14px;
}

/* logo image */

.logo-ring{
  width:58px;
  height:58px;

  border-radius:50%;
  overflow:hidden;

  border:2px solid rgba(210,175,110,0.5);

  flex-shrink:0;
}

.logo-ring img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

.restaurant-name{
  font-family:'Cormorant Garamond',serif;
  color:#f4e7d1;
  font-size:30px;
  letter-spacing:3px;
  text-transform:uppercase;
  line-height:1;
}

.tagline{
  color:#c9ab7a;
  font-size:10px;
  letter-spacing:3px;
  text-transform:uppercase;
  margin-top:6px;
}

.gold-line{
  margin-top:18px;
  height:1px;

  background:linear-gradient(
    to right,
    transparent,
    #c9ab7a,
    transparent
  );
}

/* =========================
   HERO SECTION
========================= */

.hero{
  position:relative;
  z-index:2;

  padding:32px 30px 28px;

  border-bottom:1px solid rgba(139,104,69,0.15);
}

.badge{
  display:inline-block;

  border:1px solid #c9ab7a;

  padding:4px 12px;

  color:#8b6845;

  font-size:9px;
  letter-spacing:2px;
  text-transform:uppercase;

  margin-bottom:18px;
}

.title{
  font-family:'Cormorant Garamond',serif;
  font-size:52px;
  line-height:.95;
  color:#2c1f14;
}

.title em{
  font-style:italic;
  color:#8b6845;
  font-weight:400;
}

.description{
  margin-top:18px;

  color:#7a6550;

  font-size:12px;
  line-height:1.8;

  max-width:300px;
}

.price-row{
  margin-top:24px;

  display:flex;
  align-items:center;
}

.price{
  font-family:'Cormorant Garamond',serif;
  font-size:42px;
  color:#2c1f14;
  line-height:1;
}

.price-label{
  color:#9c8060;
  font-size:10px;
  letter-spacing:2px;
  text-transform:uppercase;
  margin-top:4px;
}

.order-btn{
  margin-left:auto;

  background:#2c1f14;
  color:#f4e7d1;

  border:none;

  padding:12px 22px;

  font-size:10px;
  letter-spacing:2px;
  text-transform:uppercase;

  border-left:3px solid #c9ab7a;

  cursor:pointer;
}

/* =========================
   RESTAURANT SVG
========================= */

.food-svg-wrap{
  position:relative;
  z-index:2;

  padding:25px 25px 18px;

  border-bottom:1px solid rgba(139,104,69,0.15);
}

.food-svg-wrap svg{
  width:100%;
  display:block;
}

/* =========================
   TAGS
========================= */

.tags{
  position:relative;
  z-index:2;

  padding:18px 30px;

  display:flex;
  flex-wrap:wrap;
  gap:10px;

  border-bottom:1px solid rgba(139,104,69,0.15);
}

.tag{
  border:1px solid #c9ab7a;

  padding:5px 12px;

  color:#8b6845;

  font-size:9px;
  letter-spacing:1.5px;
  text-transform:uppercase;
}

.tag.fill{
  background:#2c1f14;
  border-color:#2c1f14;
  color:#d8b682;
}

/* =========================
   FOOTER
========================= */

.footer{
  position:relative;
  z-index:2;

  background:#2c1f14;

  padding:14px 24px;

  display:flex;
  justify-content:space-between;
  align-items:center;

  gap:10px;
}

.footer-item{
  display:flex;
  align-items:center;
  gap:6px;

  color:#d2af6e;

  font-size:9px;
}

.footer-item svg{
  flex-shrink:0;
}

</style>
</head>

<body>

<div class="poster">

  <!-- HEADER -->
  <div class="header">

    <div class="logo-wrap">

      <!-- LOGO IMAGE -->
      <div class="logo-ring">
        <img
          src="https://static.vecteezy.com/system/resources/thumbnails/014/664/003/small_2x/cafe-and-resto-logo-vector.jpg"
          alt="Restaurant Logo">
      </div>

      <!-- RESTAURANT INFO -->
      <div>
        <div class="restaurant-name">
          Spice Garden
        </div>
      </div>

    </div>

    <div class="gold-line"></div>

  </div>

  <!-- HERO -->
  <div class="hero">

    <div class="badge">
      Chef's Special
    </div>

    <div class="title">
      Butter <em>Chicken</em><br>
      Masala
    </div>

    <div class="description">
      Slow-cooked tender chicken in a rich,
      velvety tomato-butter gravy infused
      with aromatic Indian spices and
      finished with fresh cream.
    </div>

    <div class="price-row">

      

      <button class="order-btn">
        Order Now
      </button>

    </div>

  </div>

  <!-- RESTAURANT SVG -->
  <div class="food-svg-wrap">

    <svg viewBox="0 0 432 120"
         xmlns="http://www.w3.org/2000/svg">

      <!-- plate -->
      <ellipse cx="216"
               cy="80"
               rx="120"
               ry="20"
               fill="none"
               stroke="#c8a97a"
               stroke-width="1.2"/>

      <!-- bowl -->
      <path d="M140 45
               Q216 105
               292 45"
            fill="none"
            stroke="#2c1f14"
            stroke-width="3"/>

      <!-- steam -->
      <path d="M185 20
               Q175 10
               185 0"
            fill="none"
            stroke="#8b6845"
            stroke-width="2"
            stroke-linecap="round"/>

      <path d="M216 25
               Q206 12
               216 0"
            fill="none"
            stroke="#8b6845"
            stroke-width="2"
            stroke-linecap="round"/>

      <path d="M247 20
               Q237 10
               247 0"
            fill="none"
            stroke="#8b6845"
            stroke-width="2"
            stroke-linecap="round"/>

      <!-- spoon -->
      <line x1="300"
            y1="20"
            x2="340"
            y2="70"
            stroke="#d2af6e"
            stroke-width="3"
            stroke-linecap="round"/>

      <ellipse cx="292"
               cy="13"
               rx="10"
               ry="14"
               fill="none"
               stroke="#d2af6e"
               stroke-width="2"/>

    </svg>

  </div>

  

  <!-- FOOTER -->
  <div class="footer">

    <div class="footer-item">

      <svg width="11"
           height="11"
           viewBox="0 0 11 11"
           fill="none">

        <path d="M2 1.5C2 1.5 3 1 3.5 2.5C4 4
        3 4.5 3.5 5.5C4 6.5 5.5 8 6.5 8.5
        C7.5 9 8 8 8 8L9.5 9C9.5 9 9 10.5
        7.5 10C5 9 2 5.5 1.5 3.5C1 1.5
        2 1.5 2 1.5Z"
        stroke="#d2af6e"
        stroke-width="0.7"/>

      </svg>

      <span>
        +91 98765 43210
      </span>

    </div>

    <div class="footer-item">

      <svg width="11"
           height="11"
           viewBox="0 0 11 11"
           fill="none">

        <rect x="1"
              y="2.5"
              width="9"
              height="6.5"
              rx="1"
              stroke="#d2af6e"
              stroke-width="0.7"/>

        <path d="M1 4L5.5 7L10 4"
              stroke="#d2af6e"
              stroke-width="0.7"/>

      </svg>

      <span>
        spicegarden.com
      </span>

    </div>

    <div class="footer-item">

      <svg width="11"
           height="11"
           viewBox="0 0 11 11"
           fill="none">

        <path d="M5.5 1
                 C4 1 3 2.2 3 3.5
                 C3 5.5 5.5 10 5.5 10
                 S8 5.5 8 3.5
                 C8 2.2 7 1 5.5 1Z"
              stroke="#d2af6e"
              stroke-width="0.7"/>

        <circle cx="5.5"
                cy="3.5"
                r="1"
                stroke="#d2af6e"
                stroke-width="0.6"/>

      </svg>

      <span>
        MG Road, Kozhikode
      </span>

    </div>

  </div>

</div>

</body>
</html>
