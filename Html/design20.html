        /* ================================================================
   DESIGN 7 – COMPLETE REDESIGN

   ================================================================ */

        :root {
            --g-bg: #14401a;
            --g-dark: #0d2e12;

            /* legacy aliases */

        .design13-wrapper {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 28px 0 24px;
            font-family: "Noto Sans Ol Chiki", sans-serif;
        }

        .design13-wrapper .design13-card {
            width: 100%;
            max-width: 360px;
            aspect-ratio: 3/4;
            background: var(--g-bg);
            border-radius: 5px;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0 28px 80px rgba(0, 0, 0, 0.65);
            box-sizing: border-box;
        }

        /* outer edge strips */
        .design13-wrapper .d13-outer-tile {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 10px;
            z-index: 30;
            pointer-events: none;
        }

        .design13-wrapper .d13-outer-tile.left {
            left: 0;
        }

        .design13-wrapper .d13-outer-tile.right {
            right: 0;
        }

        /* ─── 1. HEADER ─── */
        .design13-wrapper .d13-sky {
            flex-shrink: 0;
            height: 74px;
            background: var(--g-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            position: relative;
            z-index: 5;
            width: 100%;
        }

        /* ─── 2. HL-WRAP (ornamental divider) ─── */
        .design13-wrapper .d13-hl-wrap {
            flex-shrink: 0;
            background: var(--g-dark);
            padding: 0 20px 5px;
            text-align: center;
            position: relative;
            z-index: 99;
            

        }

        .design13-wrapper .d13-hl-wrap::before {
            display: none;
        }

        .design13-wrapper .d13-headline {
            display: none;
        }

        /* ─── 3. FOOD SECTION ─── */
        .design13-wrapper .d13-food {
            flex: 1;
            min-height: 0;
            position: relative;
            background: var(--g-bg);
            overflow: hidden;
            display: flex;
            align-items: stretch;
            justify-content: center;
            width: 120%;
            border: 2px solid white;
        }

        /* Central vertical lighter strip */
        .design13-wrapper .d13-food::before {
            content: '';
            position: absolute;
            top: 0;
            bottom: 0;
            left: 17%;
            right: 17%;
            background: linear-gradient(180deg,
                    #2e7838 0%,
                    #265e30 40%,
                    #1e5228 70%,
                    #184a22 100%);
            z-index: 1;
            box-shadow:
                4px 0 20px rgba(0, 0, 0, 0.35),
                -4px 0 20px rgba(0, 0, 0, 0.35);
            opacity: 0;
        }

        /* Food image (sits on top of strip) */
        .design13-wrapper .d13-food img {
            position: relative;
            z-index: 3;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center 20%;
            display: block;
            margin: 0 auto;
        }

        .design13-wrapper .d13-food-bg {
            position: relative;
            z-index: 3;
            width: 66%;
            height: 100%;
            margin: 0 auto;
            background: linear-gradient(180deg, #2a7035 0%, #0d2e12 100%);
        }

        .design13-wrapper .d13-olive {
            display: none !important;
        }

        /* Mandala layer — behind food image, over green sides */
        .design13-wrapper .d13-mandala-wrap {
            position: absolute;
            inset: 0;
            z-index: 2;
            pointer-events: none;
        }

        /* ─── 4. TAGLINE / HEADLINE ─── */
        .design13-wrapper .d13-tagline-wrap {
            flex-shrink: 0;
            background: var(--g-dark);
            padding: 8px 24px 6px;
            text-align: center;
            position: relative;
        }

        .design13-wrapper .d13-tagline-wrap::before,
        .design13-wrapper .d13-tagline-wrap::after {
            content: '';
            position: absolute;
            left: 16px;
            right: 16px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold) 35%, var(--gold) 65%, transparent);
            opacity: .5;
        }

        .design13-wrapper .d13-tagline-wrap::before {
            top: 0;
        }

        .design13-wrapper .d13-tagline-wrap::after {
            bottom: 0;
        }

        .design13-wrapper .d13-tagline {
            font-family: "Noto Sans Ol Chiki", sans-serif;
            font-family: 'Vastile DEMO';

            font-size: clamp(15px, 5vw, 21px);
            color: var(--white);
            margin: 0;
            line-height: 1.25;
            letter-spacing: 2.5px;
            /* text-transform: uppercase; */
        }

        /* ─── 5. INFO ROW — collapsed ─── */
        .design13-wrapper .d13-info-row {
            height: 0;
            overflow: hidden;
            min-height: 0;
        }

        .design13-wrapper .d13-tile-col-wide,

        }

        /* ─── 6. CONTACT ROW ─── */
        .design13-wrapper .d13-contact-row {

            align-items: center;
            justify-content: center;

    <script>
        /* UNCHANGED from original */
        function downloaddesign13() {
            var card = document.getElementById('posterCard7');
            var button = document.querySelector('.d13-download-btn');
            button.innerHTML = '<i class="bi bi-hourglass-split"></i> Generating...';
            button.disabled = true;
            var exportW = 1080;
            var scale = exportW / card.offsetWidth;
            html2canvas(card, {
                scale: scale,
                backgroundColor: null,
                logging: false,
                useCORS: true,
                allowTaint: true,
                imageTimeout: 0,
                onclone: function(clonedDoc) {
                    var images = clonedDoc.querySelectorAll('img');
                    return Promise.all(Array.from(images).map(function(img) {
                        return new Promise(function(resolve) {
                            if (img.complete) {
                                resolve();
                            } else {
                                img.onload = resolve;
                                img.onerror = resolve;
                            }
                        });
                    }));
                }
            }).then(function(canvas) {
                var link = document.createElement('a');
                link.download = 'menu-poster-instagram.png';
                link.href = canvas.toDataURL('image/png', 1.0);
                link.click();
                button.innerHTML = '<i class="bi bi-download"></i> Download Poster';
                button.disabled = false;
            }).catch(function(error) {
                console.error('Error:', error);
                alert('Failed to generate. Please try again.');
                button.innerHTML = '<i class="bi bi-download"></i> Download Poster';
                button.disabled = false;
            });
        }
    </script>
