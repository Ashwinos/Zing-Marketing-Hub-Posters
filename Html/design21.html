    body {

    /* ── 340 × 425 px (4:5) ── */
    #posterCard7 {

      height: 425px;

    /* ════════════════════════════
   LAYER 0 — full green base
════════════════════════════ */
    .bg-green {
      position: absolute;
      inset: 0;
      z-index: 0;


    }


    /* ════════════════════════════
   LAYER 1 — sun rays
════════════════════════════ */
    .rays {
      position: absolute;
      inset: 0;
      width: 340px;
      height: 425px;
      z-index: 1;
      pointer-events: none;
      opacity: 0.05;
    }

    .rays-box {
      position: absolute;
      inset: 0;
      width: 170%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
      opacity: 0.2;
      transform: translate(-50%);
      left: 50%;
    }

    /* ════════════════════════════
   LAYER 2 — dark triangle TOP-LEFT
   (logo corner — exactly like sketch)
════════════════════════════ */
    .corner-dark {
      position: absolute;
      inset: 0;
      z-index: 2;
      background: #ffffff;
      clip-path: polygon(0 0, 27% 0, 0 22%);
    }

    /* ════════════════════════════════════════════
   LAYER 5 — BLACK POLYGON  (bottom-right)

   This is the angle shape from your sketch:
   four vertices forming a quadrilateral with
   a sharp pointed vertex on the left side.

   Sketch vertices mapped to 340 × 425 px:
   ① left  peak   → (34%, 57%) = (116 px, 242 px)
   ② top-right    → (100%,38%) = (340 px, 162 px)
   ③ bottom-right → (100%,100%)= (340 px, 425 px)
   ④ bottom-left  → ( 38%,100%)= (129 px, 425 px)
════════════════════════════════════════════ */

  position:absolute; inset:0; z-index:5;

} */

  <script>
    /* UNCHANGED from original */
    function downloaddesign13() {
      var card = document.getElementById('posterCard7');
      var button = document.querySelector('.d13-download-btn');
      button.innerHTML = '<i class="bi bi-hourglass-split"></i> Generating...';
      button.disabled = true;
      var exportW = 1080;
      var scale = exportW / card.offsetWidth;
      html2canvas(card, {
        scale: scale,
        backgroundColor: null,
        logging: false,
        useCORS: true,
        allowTaint: true,
        imageTimeout: 0,
        onclone: function (clonedDoc) {
          var images = clonedDoc.querySelectorAll('img');
          return Promise.all(Array.from(images).map(function (img) {
            return new Promise(function (resolve) {
              if (img.complete) {
                resolve();
              } else {
                img.onload = resolve;
                img.onerror = resolve;
              }
            });
          }));
        }
      }).then(function (canvas) {
        var link = document.createElement('a');
        link.download = 'menu-poster-instagram.png';
        link.href = canvas.toDataURL('image/png', 1.0);
        link.click();
        button.innerHTML = '<i class="bi bi-download"></i> Download Poster';
        button.disabled = false;
      }).catch(function (error) {
        console.error('Error:', error);
        alert('Failed to generate. Please try again.');
        button.innerHTML = '<i class="bi bi-download"></i> Download Poster';
        button.disabled = false;
      });
    }
  </script>
